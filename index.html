<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inside the Look</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Banner -->
    <section class="hero">
        <img src="images/banner-1.jpg" alt="Banner Principal">
    </section>

    <!-- Primeira Seção -->
    <section class="section-1">

        <div class="image">
            <img src="images/foto-1.jpg" alt="">
        </div>

        <div class="content">

            <h2>A regra dos três pilares</h2>

            <p>
                Todo look marcante costuma equilibrar
                <span class="medium">três elementos:</span>
                <span class="medium">proporção</span>,
                <span class="medium">textura</span> e
                <span class="medium">movimento</span>.
                Quando esses pilares trabalham juntos,
                o resultado é uma produção sofisticada,
                mesmo em uma cartela de cores neutras.
            </p>

        </div>

    </section>

</body>

</html>
