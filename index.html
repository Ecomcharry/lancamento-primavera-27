<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inside the Look</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- BANNER 1 -->

<section class="hero">

<img src="./images/banner-1.jpg" alt="Banner 1">

</section>




<!-- BANNER 2 -->

<section class="banner banner-normal">

<img src="./images/banner-2.jpg" alt="Banner 2">

</section>




<!-- BANNER 3 -->

<section class="banner banner-small">

<img src="./images/banner-3.jpg" alt="Banner 3">

</section>




<!-- BANNER 4 -->

<section class="banner banner-small">

<img src="./images/banner-4.jpg" alt="Banner 4">

</section>






<!-- CARROSSEL -->


<section class="instagram-carousel">


<div class="carousel-area">


<button class="arrow prev" onclick="prevSlide()">

‹

</button>




<div class="carousel-box">


<div class="carousel-track">


<img src="./images/foto-1.jpg" alt="Foto 1">

<img src="./images/foto-2.jpg" alt="Foto 2">

<img src="./images/foto-3.jpg" alt="Foto 3">

<img src="./images/foto-4.jpg" alt="Foto 4">

<img src="./images/foto-5.jpg" alt="Foto 5">


</div>


</div>





<button class="arrow next" onclick="nextSlide()">

›

</button>


</div>





<div class="dots">


<span class="active"></span>

<span></span>

<span></span>

<span></span>

<span></span>


</div>



</section>








<!-- VIDEO + BANNER 5 -->


<section class="video-banner">


<div class="video-box">


<video autoplay muted loop playsinline>

<source src="./images/video.mp4" type="video/mp4">

</video>


</div>





<div class="banner5-box">


<img src="./images/banner-5.jpg" alt="Banner 5">


</div>



</section>


<!-- BANNER 6 -->

<section class="banner banner-normal">

    <img src="./images/banner-6.jpg" alt="Banner 6">

</section>



<!-- FEED INSTAGRAM -->

<section class="instagram-feed">

    <img src="./images/foto-6.jpg" alt="Foto 6">

    <img src="./images/foto-7.jpg" alt="Foto 7">

    <img src="./images/foto-8.jpg" alt="Foto 8">

    <img src="./images/foto-9.jpg" alt="Foto 9">

    <img src="./images/foto-10.jpg" alt="Foto 10">

    <img src="./images/foto-11.jpg" alt="Foto 11">

    <img src="./images/foto-12.jpg" alt="Foto 12">

    <img src="./images/foto-13.jpg" alt="Foto 13">

    <img src="./images/foto-14.jpg" alt="Foto 14">

    <img src="./images/foto-15.jpg" alt="Foto 15">

</section>

</section>


<!-- BANNER 7 -->

<section class="banner banner-normal">

    <img src="./images/banner-7.jpg" alt="Banner 7">

</section>




<script>


let slide = 0;


const track = document.querySelector(".carousel-track");

const dots = document.querySelectorAll(".dots span");

const total = 5;



function showSlide(){


track.style.transform = `translateX(-${slide * 100}%)`;



dots.forEach(dot => {

dot.classList.remove("active");

});



dots[slide].classList.add("active");


}




function nextSlide(){


slide++;


if(slide >= total){

slide = 0;

}


showSlide();


}





function prevSlide(){


slide--;


if(slide < 0){

slide = total - 1;

}


showSlide();


}


</script>



</body>

</html>
