<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Inside the Look</title>


    <!-- Banner inicial prioritário no desktop -->

    <link
        rel="preload"
        as="image"
        href="./images/banner-1.jpg"
        media="(min-width: 901px)"
    >


    <!-- Banner inicial prioritário no mobile -->

    <link
        rel="preload"
        as="image"
        href="./images/mob-1.jpg"
        media="(max-width: 900px)"
    >


    <!-- Carregamento antecipado do vídeo no mobile -->

    <link
        rel="preload"
        as="video"
        href="./images/video.mp4"
        type="video/mp4"
        media="(max-width: 900px)"
    >


    <link rel="stylesheet" href="./style.css">

    <script src="./script.js" defer></script>
</head>


<body>

    <!-- ==========================
    BANNER 1

    DESKTOP: banner-1.jpg
    MOBILE: mob-1.jpg
    =========================== -->

    <section class="hero">

        <picture>

            <source
                media="(max-width: 900px)"
                srcset="./images/mob-1.jpg"
            >

            <img
                src="./images/banner-1.jpg"
                alt="Inside the Look"
                fetchpriority="high"
                decoding="async"
            >

        </picture>

    </section>


    <!-- ==========================
    BANNER 2

    DESKTOP: banner-2.jpg
    MOBILE: mob-2.jpg
    =========================== -->

    <section class="banner banner-normal">

        <picture>

            <source
                media="(max-width: 900px)"
                srcset="./images/mob-2.jpg"
            >

            <img
                src="./images/banner-2.jpg"
                alt="Inside the Look Charry"
                loading="lazy"
                decoding="async"
            >

        </picture>

    </section>


    <!-- ==========================
    BANNER 3 COM LINK

    DESKTOP: banner-3.jpg
    MOBILE: mob-3.jpg
    =========================== -->

    <section class="banner banner-small">

        <a
            href="https://www.charry.com.br/products/blusa-reta-lisa-com-gola-2?variant=45374858461254"
            aria-label="Conhecer a Blusa Reta Lisa com Gola"
        >

            <picture>

                <source
                    media="(max-width: 900px)"
                    srcset="./images/mob-3.jpg"
                >

                <img
                    src="./images/banner-3.jpg"
                    alt="Blusa Reta Lisa com Gola"
                    loading="lazy"
                    decoding="async"
                >

            </picture>

        </a>

    </section>


    <!-- ==========================
    BANNER 4

    DESKTOP: banner-4.jpg
    MOBILE: mob-4.jpg
    =========================== -->

    <section class="banner banner-small">

        <picture>

            <source
                media="(max-width: 900px)"
                srcset="./images/mob-4.jpg"
            >

            <img
                src="./images/banner-4.jpg"
                alt="Coleção Charry"
                loading="lazy"
                decoding="async"
            >

        </picture>

    </section>


    <!-- ==========================
    CARROSSEL COM 5 IMAGENS
    =========================== -->

    <section class="instagram-carousel">

        <div
            class="carousel-area"
            tabindex="0"
            aria-label="Carrossel da Calça Ballon Lisa"
        >

            <button
                class="arrow prev"
                type="button"
                aria-label="Mostrar imagem anterior"
            >
                ‹
            </button>


            <a
                href="https://www.charry.com.br/products/calca-ballon-lisa-1?variant=45374855708742"
                class="carousel-product-link"
                aria-label="Conhecer a Calça Ballon Lisa"
            >

                <div class="carousel-box">

                    <div class="carousel-track">

                        <img
                            src="./images/foto-1.jpg"
                            alt="Calça Ballon Lisa - Foto 1"
                            decoding="async"
                        >

                        <img
                            data-src="./images/foto-2.jpg"
                            alt="Calça Ballon Lisa - Foto 2"
                            decoding="async"
                        >

                        <img
                            data-src="./images/foto-3.JPG"
                            alt="Calça Ballon Lisa - Foto 3"
                            decoding="async"
                        >

                        <img
                            data-src="./images/foto-4.JPG"
                            alt="Calça Ballon Lisa - Foto 4"
                            decoding="async"
                        >

                        <img
                            data-src="./images/foto-5.jpg"
                            alt="Calça Ballon Lisa - Foto 5"
                            decoding="async"
                        >

                    </div>

                </div>

            </a>


            <button
                class="arrow next"
                type="button"
                aria-label="Mostrar próxima imagem"
            >
                ›
            </button>

        </div>


        <div class="dots" aria-hidden="true">

            <span class="active"></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

    </section>


    <!-- ==========================
    VÍDEO + BANNER 5
    =========================== -->

    <section class="video-banner">

        <!-- VÍDEO COM LINK -->

        <a
            href="https://www.charry.com.br/products/lenco-pareo-liso-com-franja?variant=45309853892678"
            class="video-product-link"
            aria-label="Conhecer o Lenço Pareô Liso com Franja"
        >

            <div class="video-box">

                <video
                    class="product-video"
                    autoplay
                    muted
                    loop
                    playsinline
                    webkit-playsinline
                    preload="auto"
                    disablepictureinpicture
                    aria-label="Vídeo do Lenço Pareô Liso com Franja"
                >

                    <source
                        src="./images/video.mp4"
                        type="video/mp4"
                    >

                    Seu navegador não suporta a reprodução deste vídeo.

                </video>

            </div>

        </a>


        <!-- ==========================
        BANNER 5 COM LINK

        DESKTOP: banner-5.jpg
        MOBILE: mob-5.jpg
        =========================== -->

        <a
            href="https://www.charry.com.br/products/lenco-pareo-liso-com-franja?variant=45309853892678"
            class="banner5-product-link"
            aria-label="Conhecer o Lenço Pareô Liso com Franja"
        >

            <div class="banner5-box">

                <picture>

                    <source
                        media="(max-width: 900px)"
                        srcset="./images/mob-5.jpg"
                    >

                    <img
                        src="./images/banner-5.jpg"
                        alt="Lenço Pareô Liso com Franja"
                        loading="lazy"
                        decoding="async"
                    >

                </picture>

            </div>

        </a>

    </section>


    <!-- ==========================
    BANNER 6 — SOMENTE DESKTOP

    No mobile ele fica escondido.
    =========================== -->

    <section class="banner banner-normal banner-6-desktop">

        <img
            class="desktop-banner-image"
            data-src="./images/banner-6.jpg"
            alt="Coleção Charry"
            decoding="async"
        >

    </section>


    <!-- ==========================
    FEED COM 12 FOTOS
    =========================== -->

    <section class="instagram-feed">

        <img
            src="./images/foto-6.jpg"
            alt="Charry - Foto 6"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-7.jpg"
            alt="Charry - Foto 7"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-8.jpeg"
            alt="Charry - Foto 8"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-9.jpeg"
            alt="Charry - Foto 9"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-10.JPG"
            alt="Charry - Foto 10"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-11.JPG"
            alt="Charry - Foto 11"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-12.JPG"
            alt="Charry - Foto 12"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-13.JPG"
            alt="Charry - Foto 13"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-14.jpg"
            alt="Charry - Foto 14"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-15.jpg"
            alt="Charry - Foto 15"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-16.JPG"
            alt="Charry - Foto 16"
            loading="lazy"
            decoding="async"
        >

        <img
            src="./images/foto-17.JPG"
            alt="Charry - Foto 17"
            loading="lazy"
            decoding="async"
        >

    </section>


    <!-- ==========================
    BANNER FINAL COM O MESMO LINK

    DESKTOP: banner-7.jpg
    MOBILE: mob-6.jpg
    =========================== -->

    <section class="banner banner-normal final-banner">

        <a
            href="https://chat.whatsapp.com/LM0r58rotgbGuj0oB4m6Rk"
            target="_blank"
            rel="noopener noreferrer"
            class="final-banner-link"
            aria-label="Entrar no grupo da Charry no WhatsApp"
        >

            <picture>

                <source
                    media="(max-width: 900px)"
                    srcset="./images/mob-6.jpg"
                >

                <img
                    src="./images/banner-7.jpg"
                    alt="Entre no grupo da Charry no WhatsApp"
                    loading="lazy"
                    decoding="async"
                >

            </picture>

        </a>

    </section>

</body>

</html>
