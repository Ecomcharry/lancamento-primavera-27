<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Inside the Look</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <!-- ==========================
    BANNER 1
    =========================== -->

    <section class="hero">

        <img
            src="./images/banner-1.jpg"
            alt="Inside the Look"
        >

    </section>


    <!-- ==========================
    BANNER 2
    =========================== -->

    <section class="banner banner-normal">

        <img
            src="./images/banner-2.jpg"
            alt="Banner Inside the Look"
            loading="lazy"
        >

    </section>


    <!-- ==========================
    BANNER 3 COM LINK
    =========================== -->

    <section class="banner banner-small">

        <a
            href="https://www.charry.com.br/products/blusa-reta-lisa-com-gola-2?variant=45374858461254"
            aria-label="Conhecer a Blusa Reta Lisa com Gola"
        >

            <img
                src="./images/banner-3.jpg"
                alt="Blusa Reta Lisa com Gola"
                loading="lazy"
            >

        </a>

    </section>


    <!-- ==========================
    BANNER 4
    =========================== -->

    <section class="banner banner-small">

        <img
            src="./images/banner-4.jpg"
            alt="Banner coleção Charry"
            loading="lazy"
        >

    </section>


    <!-- ==========================
    CARROSSEL COM LINK
    =========================== -->

    <section class="instagram-carousel">

        <div class="carousel-area">

            <button
                class="arrow prev"
                type="button"
                aria-label="Mostrar imagem anterior"
                onclick="prevSlide()"
            >
                ‹
            </button>


            <a
                href="https://www.charry.com.br/products/calca-ballon-lisa-1?variant=45374855708742"
                class="carousel-product-link"
                aria-label="Conhecer a Calça Ballon Lisa"
            >

                <div class="carousel-box">

                    <div class="carousel-track">

                        <img
                            src="./images/foto-1.jpg"
                            alt="Calça Ballon Lisa - Foto 1"
                            loading="lazy"
                        >

                        <img
                            src="./images/foto-2.jpg"
                            alt="Calça Ballon Lisa - Foto 2"
                            loading="lazy"
                        >

                        <img
                            src="./images/foto-3.jpg"
                            alt="Calça Ballon Lisa - Foto 3"
                            loading="lazy"
                        >

                        <img
                            src="./images/foto-4.JPG"
                            alt="Calça Ballon Lisa - Foto 4"
                            loading="lazy"
                        >

                        <img
                            src="./images/foto-5.jpg"
                            alt="Calça Ballon Lisa - Foto 5"
                            loading="lazy"
                        >

                    </div>

                </div>

            </a>


            <button
                class="arrow next"
                type="button"
                aria-label="Mostrar próxima imagem"
                onclick="nextSlide()"
            >
                ›
            </button>

        </div>


        <div class="dots" aria-hidden="true">

            <span class="active"></span>

            <span></span>

            <span></span>

            <span></span>

            <span></span>

        </div>

    </section>


    <!-- ==========================
    VÍDEO + BANNER 5 COM LINK
    =========================== -->

    <section class="video-banner">

        <a
            href="https://www.charry.com.br/products/lenco-pareo-liso-com-franja?variant=45309853892678"
            class="video-product-link"
            aria-label="Conhecer o Lenço Pareô Liso com Franja"
        >

            <div class="video-box">

                <video
                    autoplay
                    muted
                    loop
                    playsinline
                    preload="metadata"
                >

                    <source
                        src="./images/video.mp4"
                        type="video/mp4"
                    >

                    Seu navegador não suporta a reprodução deste vídeo.

                </video>

            </div>

        </a>


        <a
            href="https://www.charry.com.br/products/lenco-pareo-liso-com-franja?variant=45309853892678"
            class="banner5-product-link"
            aria-label="Conhecer o Lenço Pareô Liso com Franja"
        >

            <div class="banner5-box">

                <img
                    src="./images/banner-5.jpg"
                    alt="Lenço Pareô Liso com Franja"
                    loading="lazy"
                >

            </div>

        </a>

    </section>


    <!-- ==========================
    BANNER 6
    =========================== -->

    <section class="banner banner-normal">

        <img
            src="./images/banner-6.jpg"
            alt="Banner coleção Charry"
            loading="lazy"
        >

    </section>


    <!-- ==========================
    FEED DE IMAGENS
    =========================== -->

    <section class="instagram-feed">

        <img
            src="./images/foto-6.jpg"
            alt="Charry - Foto 6"
            loading="lazy"
        >

        <img
            src="./images/foto-7.jpg"
            alt="Charry - Foto 7"
            loading="lazy"
        >

        <img
            src="./images/foto-8.jpeg"
            alt="Charry - Foto 8"
            loading="lazy"
        >

        <img
            src="./images/foto-9.jpeg"
            alt="Charry - Foto 9"
            loading="lazy"
        >

        <img
            src="./images/foto-10.jpg"
            alt="Charry - Foto 10"
            loading="lazy"
        >

        <img
            src="./images/foto-11.jpg"
            alt="Charry - Foto 11"
            loading="lazy"
        >

        <img
            src="./images/foto-12.jpg"
            alt="Charry - Foto 12"
            loading="lazy"
        >

        <img
            src="./images/foto-13.jpg"
            alt="Charry - Foto 13"
            loading="lazy"
        >

        <img
            src="./images/foto-14.jpg"
            alt="Charry - Foto 14"
            loading="lazy"
        >

        <img
            src="./images/foto-15.jpg"
            alt="Charry - Foto 15"
            loading="lazy"
        >

    </section>


    <!-- ==========================
    BANNER 7 COM LINK PARA WHATSAPP
    =========================== -->

    <section class="banner banner-normal">

        <a
            href="https://chat.whatsapp.com/LM0r58rotgbGuj0oB4m6Rk"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Entrar no grupo da Charry no WhatsApp"
        >

            <img
                src="./images/banner-7.jpg"
                alt="Entre no grupo da Charry no WhatsApp"
                loading="lazy"
            >

        </a>

    </section>


    <script src="./script.js"></script>

</body>

</html>
